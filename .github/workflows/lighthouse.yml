name: Lighthouse Quality Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  lighthouse-dry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npm run lighthouse:dry
