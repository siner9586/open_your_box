name: Real Self Audit

on:
  push:
    branches: [main]
    paths-ignore:
      - 'reports/real/**'
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Owned or explicitly authorized site URL'
        required: false
        default: 'https://open-your-box.pages.dev'
      allowed_hosts:
        description: 'Comma separated owned or explicitly authorized hosts'
        required: false
        default: 'open-your-box.pages.dev'
  schedule:
    - cron: '42 22 * * 1'

permissions:
  contents: write

concurrency:
  group: real-self-audit
  cancel-in-progress: false

jobs:
  real-self-audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Generate real self audit report
        env:
          OYB_SITE_URL: ${{ github.event.inputs.site_url || 'https://open-your-box.pages.dev' }}
          OYB_ALLOWED_SITE_HOSTS: ${{ github.event.inputs.allowed_hosts || 'open-your-box.pages.dev' }}
        run: node scripts/generate-site-self-audit.mjs
      - name: Commit real self audit report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/real/latest-self-audit.md reports/real/latest-self-audit.json
          git diff --cached --quiet || git commit -m "chore: update real self audit report"
          git push
