name: Weekly Demo Exposure Report

on:
  schedule:
    - cron: '18 22 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  demo-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run demo:report
      - name: Commit demo report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/demo/latest-demo-report.md
          git diff --cached --quiet || git commit -m "chore: update weekly demo exposure report"
          git push
